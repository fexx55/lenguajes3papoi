<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo de Videojuegos - TP 9 Repaso II</title>
    <meta name="referrer" content="no-referrer">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="contenedor">
    <h1>Inscripción al Torneo</h1>

    <section class="seccion-caja">
        <h2>Datos del Jugador</h2>
        
        <div class="grupo-input">
            <label for="nickname">Nickname:</label>
            <input type="text" id="nickname" placeholder="Mínimo 3 caracteres">
            <span id="err-nick" class="error-msg"></span>
        </div>

        <div class="grupo-input">
            <label for="edad">Edad:</label>
            <input type="number" id="edad" placeholder="Mayor de 16 años">
            <span id="err-edad" class="error-msg"></span>
        </div>

        <div class="grupo-input">
            <label for="codigo">Codigo de equipo:</label>
            <input type="number" id="codigo" placeholder="Ej: 1234">
            <span id="err-codigo" class="error-msg"></span>
        </div>
    </section>

    <section class="seccion-caja">
        <h2>Seleccion de Juego</h2>
        <p>Selecciona en que juego vas a competir:</p>
        
        <div class="grilla-juegos">
            <div class="tarjeta" onclick="seleccionarJuego(this, 'Minecraft')">
                <img src="https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_cover.png" alt="Minecraft" width="120" height="120">
                <p>Minecraft</p>
            </div>
            <div class="tarjeta" onclick="seleccionarJuego(this, 'Fortnite')">
                <img src="https://cdn2.unrealengine.com/fortnite-chapter-5-season-3-key-art-1920x1080-1" alt="Fortnite" width="120" height="120">
                <p>Fortnite</p>
            </div>
            <div class="tarjeta" onclick="seleccionarJuego(this, 'Valorant')">
                <img src="https://upload.wikimedia.org/wikipedia/en/9/97/Valorant_cover.jpg" alt="Valorant" width="120" height="120">
                <p>Valorant</p>
            </div>
            <div class="tarjeta" onclick="seleccionarJuego(this, 'FIFA 25')">
                <img src="https://upload.wikimedia.org/wikipedia/en/f/f5/EA_Sports_FC_25_cover.jpg" alt="FIFA 25" width="120" height="120">
                <p>FIFA 25</p>
            </div>
            <div class="tarjeta" onclick="seleccionarJuego(this, 'Among Us')">
                <img src="https://upload.wikimedia.org/wikipedia/en/9/93/Among_Us_cover_art.jpg" alt="Among Us" width="120" height="120">
                <p>Among Us</p>
            </div>
            <div class="tarjeta" onclick="seleccionarJuego(this, 'Rocket League')">
                <img src="https://upload.wikimedia.org/wikipedia/en/a/ac/Rocket_League_coverart.jpg" alt="Rocket League" width="120" height="120">
                <p>Rocket League</p>
            </div>
        </div>
        <span id="err-juego" class="error-msg text-center"></span>
    </section>

    <button class="btn-principal" onclick="registrar()">Registrar Inscripción</button>

    <section id="seccion-preparacion" class="seccion-caja oculto">
        <h2 class="exito">Registro exitoso</h2>
        <button class="btn-secundario" onclick="iniciarPreparacion()">Preparación</button>
        
        <div id="respuestas-prep" class="caja-respuestas"></div>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
